name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * 0'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          version: '0.11.3'
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv lock --check
      - run: uv sync --locked --group dev
      - run: uv run --locked ruff check .
      - run: uv run --locked ruff format --check .
      - run: uv run --locked mypy .
      - run: test -z "$(git ls-files 'docs/openapi/*.json')"
      - run: uv run --locked pytest -m 'not contract_live'
      - run: uv build
      - run: uv run --locked tosstrader --help

  contract-live:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          version: '0.11.3'
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - run: uv sync --locked --group dev
      - run: uv run --locked pytest -m contract_live
